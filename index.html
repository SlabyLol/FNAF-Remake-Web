<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FNAF: The Yellow Survivor</title>
    <style>
        :root { --freddy: #4b2e2e; --yellow-guy: #ffd700; }
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }

        /* --- MENÜ --- */
        #menu {
            position: fixed; width: 100%; height: 100%; background: #000;
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .title { font-size: 4rem; color: #600; text-shadow: 2px 2px #300; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 0.9; } }

        /* --- BÜRO & CHARAKTER --- */
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #office {
            width: 1000px; height: 600px; background: #1a1a1a; margin: auto;
            position: relative; overflow: hidden; border: 10px solid #333;
            perspective: 1000px; box-shadow: inset 0 0 100px #000;
        }

        #desk {
            position: absolute; bottom: 0; width: 500px; height: 120px;
            left: 250px; background: #333; border-top: 5px solid #444; z-index: 20;
        }

        /* Der gelbe Charakter (Sicht von hinten) */
        #player {
            position: absolute; bottom: 40px; left: 450px; width: 100px; height: 130px; z-index: 25;
        }
        .p-head { width: 50px; height: 50px; background: var(--yellow-guy); border-radius: 50%; margin: 0 auto; position: relative; }
        .p-body { width: 70px; height: 80px; background: var(--yellow-guy); border-radius: 20px 20px 0 0; margin: -5px auto; }

        /* --- FREDDY AN DER TÜR --- */
        #freddy-door {
            position: absolute; left: 20px; bottom: 100px; width: 140px; height: 300px;
            display: none; z-index: 5;
        }

        /* --- KAMERA: SHOW STAGE --- */
        #monitor {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 100; display: none;
        }
        .stage-curtain { width: 100%; height: 100%; border: 20px solid #400; background: #111; position: relative; }
        #stage-freddy {
            width: 100px; height: 200px; background: var(--freddy);
            position: absolute; left: 45%; top: 30%; border-radius: 20px;
        }

        /* --- ANIMATIONEN --- */
        .bite-anim { animation: bite 0.5s forwards; }
        @keyframes bite {
            0% { transform: scale(1); }
            50% { transform: scale(1.5) translateY(-50px); filter: sepia(1) saturate(5); }
            100% { opacity: 0; }
        }

        #scare-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: red; display:none; z-index:99999;
            justify-content:center; align-items:center; font-size: 5rem;
        }

        /* --- TÜREN --- */
        .door { position: absolute; left: 0; width: 180px; height: 100%; background: #222; z-index: 30; transition: 0.3s; transform: translateY(-100%); }
        .door.closed { transform: translateY(0); }

        .btn { padding: 15px 30px; background: #111; border: 2px solid #600; color: #fff; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h1 class="title">FIVE NIGHTS AT YELLOW'S</h1>
    <button class="btn" onclick="startGame()">NEW GAME</button>
</div>

<div id="game-screen">
    <div id="office">
        <div id="door-l" class="door"></div>
        
        <div id="freddy-door">
            <div style="width:70px; height:70px; background:var(--freddy); border-radius:15px; margin:auto;">
                <div style="width:10px; height:10px; background:red; border-radius:50%; display:inline-block; margin:20px 5px;"></div>
                <div style="width:10px; height:10px; background:red; border-radius:50%; display:inline-block; margin:20px 5px;"></div>
            </div>
            <div style="width:100px; height:150px; background:var(--freddy); border-radius:30px; margin:auto;"></div>
        </div>

        <div id="player">
            <div id="player-head" class="p-head"></div>
            <div class="p-body"></div>
        </div>
        
        <div id="desk"></div>
    </div>

    <div id="monitor">
        <div class="stage-curtain">
            <h2 style="text-align:center; color:white;">CAM 01: SHOW STAGE</h2>
            <div id="stage-freddy"></div>
        </div>
    </div>

    <div style="position:fixed; bottom:20px; width:100%; text-align:center;">
        <button class="btn" onclick="toggleDoor()">TÜR</button>
        <button class="btn" onclick="toggleCam()">MONITOR</button>
        <span id="stat-info">POWER: 100% | 12 AM</span>
    </div>
</div>

<div id="scare-overlay"><h1>WASTED!</h1></div>

<script>
    let pwr = 100;
    let time = 12;
    let doorClosed = false;
    let camOpen = false;
    let freddyAtDoor = false;
    let reactionTimer = 0;

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        gameLoop();
    }

    function gameLoop() {
        setInterval(() => {
            // Strom & Zeit
            pwr -= (doorClosed ? 0.3 : 0.1);
            document.getElementById('stat-info').innerText = `POWER: ${Math.floor(pwr)}% | ${time} AM`;
            if(pwr <= 0) location.reload();

            // Freddy Mechanik
            if(Math.random() > 0.95 && !freddyAtDoor) {
                freddyAtDoor = true;
                document.getElementById('stage-freddy').style.display = 'none';
                document.getElementById('freddy-door').style.display = 'block';
            }

            // DER TODES-CHECK (2 Sekunden)
            if(freddyAtDoor && !doorClosed) {
                reactionTimer++;
                if(reactionTimer >= 4) { // 4 Ticks = ca. 2 Sekunden
                    triggerDeath();
                }
            } else {
                reactionTimer = 0;
            }
        }, 500);
    }

    function triggerDeath() {
        // Kopf-Abbeiß Animation
        document.getElementById('player-head').classList.add('bite-anim');
        
        setTimeout(() => {
            document.getElementById('scare-overlay').style.display = 'flex';
            document.body.style.animation = "flicker 0.05s infinite";
            setTimeout(() => location.reload(), 2000);
        }, 500);
    }

    function toggleDoor() {
        doorClosed = !doorClosed;
        document.getElementById('door-l').classList.toggle('closed');
        if(doorClosed && freddyAtDoor) {
            freddyAtDoor = false;
            document.getElementById('freddy-door').style.display = 'none';
            document.getElementById('stage-freddy').style.display = 'block';
        }
    }

    function toggleCam() {
        camOpen = !camOpen;
        document.getElementById('monitor').style.display = camOpen ? 'block' : 'none';
    }
</script>
</body>
</html>
