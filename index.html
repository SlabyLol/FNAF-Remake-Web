<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FNAF: The Final Bite - ULTRA EDITION</title>
    <style>
        :root { 
            --freddy: #4b2e2e; --bonnie: #3b3b58; --bb: #ff5555; 
            --yellow: #ffd700; --blood: #8a0000; --iron: #222;
        }
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }

        /* --- MENÜ --- */
        #menu {
            position: fixed; width: 100%; height: 100%; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .glitch { font-size: 4rem; color: #600; animation: flash 0.2s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* --- BÜRO --- */
        #game-container { display: none; width: 100vw; height: 100vh; position: relative; }
        #office {
            width: 1000px; height: 600px; margin: auto; background: #1a1a1a;
            position: relative; border: 10px solid #333; overflow: hidden;
            perspective: 1000px; box-shadow: inset 0 0 200px #000;
        }

        /* TÜREN */
        .door { position: absolute; width: 180px; height: 100%; background: #222; z-index: 20; transform: translateY(-100%); transition: 0.3s; border-bottom: 10px solid #111; }
        .door.closed { transform: translateY(0); }
        #door-l { left: 0; border-right: 5px solid #444; }
        #door-r { right: 0; border-left: 5px solid #444; }

        /* CHARAKTER (GELB MIT GLIEDERN) */
        #player { position: absolute; bottom: 40px; left: 450px; z-index: 15; text-align: center; }
        .p-head { width: 50px; height: 50px; background: var(--yellow); border-radius: 50%; margin: 0 auto; transition: 0.2s; border: 2px solid #000; }
        .p-body { width: 70px; height: 80px; background: var(--yellow); border-radius: 15px; margin: -5px auto; }
        .p-arm { width: 12px; height: 50px; background: var(--yellow); position: absolute; top: 55px; border-radius: 5px; }

        /* ANIMATRONICS IM BÜRO */
        .monster { position: absolute; bottom: 50px; width: 120px; height: 250px; display: none; z-index: 5; }
        .m-head { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto; position: relative; }
        .m-body { width: 100px; height: 120px; border-radius: 30px; margin: 0 auto; }
        .m-arm { width: 25px; height: 90px; position: absolute; top: 20px; border-radius: 10px; animation: move 1s infinite alternate; }
        @keyframes move { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        /* MONITOR & KAMERAS */
        #monitor {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #001; z-index: 100; display: none; border: 20px solid #333;
        }
        .cam-btn { padding: 10px; background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; margin: 5px; }

        /* TODES-ANIMATIONEN */
        #scare-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; justify-content: center; align-items: center;
        }
        .big-face { width: 500px; height: 500px; border-radius: 50%; position: relative; animation: shake 0.05s infinite; }
        .jaw { width: 300px; height: 150px; background: #000; position: absolute; bottom: 30px; left: 100px; border-radius: 0 0 150px 150px; border: 5px solid #fff; }

        @keyframes shake { 0% { transform: translate(10px,10px) scale(1.1); } 50% { transform: translate(-10px,-10px) scale(1.1); } }
        .blood { position: absolute; width: 15px; height: 15px; background: var(--blood); border-radius: 50%; opacity: 0; }

        /* UI */
        #hud { position: absolute; bottom: 10px; width: 100%; text-align: center; z-index: 200; }
        .ui-btn { padding: 15px 30px; background: #111; color: #fff; border: 2px solid #555; cursor: pointer; margin: 0 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h1 class="glitch">FIVE NIGHTS AT YELLOW'S</h1>
    <button class="ui-btn" onclick="startGame()">NEUES SPIEL</button>
</div>

<div id="game-container">
    <div id="office">
        <div id="door-l" class="door"></div>
        <div id="door-r" class="door"></div>

        <div id="bonnie" class="monster" style="left: 20px;">
            <div class="m-head" style="background: var(--bonnie);"><div style="width:20px;height:50px;background:var(--bonnie);position:absolute;top:-40px;left:10px;"></div></div>
            <div class="m-body" style="background: var(--bonnie);"><div class="m-arm" style="left:-15px;background:var(--bonnie);"></div></div>
        </div>

        <div id="freddy" class="monster" style="right: 20px;">
            <div class="m-head" style="background: var(--freddy);"><div style="width:40px;height:20px;background:#000;position:absolute;top:-20px;left:20px;"></div></div>
            <div class="m-body" style="background: var(--freddy);"><div class="m-arm" style="right:-15px;background:var(--freddy);"></div></div>
        </div>

        <div id="bb" class="monster" style="left: 200px; bottom: 100px; transform: scale(0.6);">
            <div class="m-head" style="background: #ffccaa;"><div style="width:50px;height:10px;background:red;position:absolute;top:-10px;left:5px;"></div></div>
            <div class="m-body" style="background: var(--bb);"></div>
        </div>

        <div id="player">
            <div id="p-head" class="p-head"></div>
            <div class="p-body"></div>
            <div class="p-arm" style="left:-15px;"></div>
            <div class="p-arm" style="right:-15px;"></div>
        </div>

        <div style="position:absolute; bottom:0; width:100%; height:120px; background:#222; border-top:5px solid #333; z-index:10;"></div>
    </div>

    <div id="monitor">
        <h1 style="color:#0f0; text-align:center;">KAMERA SYSTEM</h1>
        <div style="text-align:center; margin-top:100px;">
            <button class="cam-btn" onclick="toggleCam()">BÜRO ZURÜCK</button>
            <p>CAM 1: STAGE | CAM 2: FLUR</p>
        </div>
    </div>

    <div id="hud">
        <button class="ui-btn" onclick="toggleDoor('l')">TÜR L (A-Taste)</button>
        <button class="ui-btn" onclick="toggleCam()">MONITOR (M-Taste)</button>
        <button class="ui-btn" onclick="toggleDoor('r')">TÜR R (L-Taste)</button>
        <p>STROM: <span id="pwr">100</span>% | ZEIT: <span id="tm">12</span> AM</p>
    </div>
</div>

<div id="scare-layer">
    <div id="face" class="big-face">
        <div class="jaw"></div>
        <div style="width:40px;height:40px;background:red;border-radius:50%;position:absolute;top:150px;left:100px;"></div>
        <div style="width:40px;height:40px;background:red;border-radius:50%;position:absolute;top:150px;right:100px;"></div>
    </div>
</div>

<script>
    let pwr = 100, time = 12, gameActive = false;
    let doorL = false, doorR = false, camOpen = false;
    let monsterPos = { bonnie: 0, freddy: 0, bb: 0 };

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        gameActive = true;
        gameLoop();
    }

    function gameLoop() {
        setInterval(() => {
            if (!gameActive) return;
            // Strom & Zeit
            pwr -= (doorL || doorR ? 0.4 : 0.1);
            document.getElementById('pwr').innerText = Math.floor(pwr);
            if (pwr <= 0) die("STROM AUS");

            if (Math.random() > 0.99) {
                time = time === 12 ? 1 : time + 1;
                document.getElementById('tm').innerText = time;
                if (time === 6) { alert("DU HAST ÜBERLEBT!"); location.reload(); }
            }

            // Monster Bewegung
            if (Math.random() > 0.9) monsterPos.bonnie = 1;
            if (Math.random() > 0.9) monsterPos.freddy = 1;
            if (Math.random() > 0.95) monsterPos.bb = 1;

            updateMonsters();
        }, 1000);
    }

    function updateMonsters() {
        document.getElementById('bonnie').style.display = monsterPos.bonnie ? 'block' : 'none';
        document.getElementById('freddy').style.display = monsterPos.freddy ? 'block' : 'none';
        document.getElementById('bb').style.display = monsterPos.bb ? 'block' : 'none';

        if (monsterPos.bonnie && !doorL) setTimeout(() => checkKill('bonnie', doorL), 3000);
        if (monsterPos.freddy && !doorR) setTimeout(() => checkKill('freddy', doorR), 3000);
        if (monsterPos.bb && !camOpen) pwr -= 2; // BB klaut Strom
    }

    function checkKill(type, door) {
        if (!door && monsterPos[type] && gameActive) triggerBite(type);
    }

    function toggleDoor(side) {
        if (side === 'l') { doorL = !doorL; document.getElementById('door-l').classList.toggle('closed'); if(doorL) monsterPos.bonnie = 0; }
        if (side === 'r') { doorR = !doorR; document.getElementById('door-r').classList.toggle('closed'); if(doorR) monsterPos.freddy = 0; }
    }

    function toggleCam() {
        camOpen = !camOpen;
        document.getElementById('monitor').style.display = camOpen ? 'block' : 'none';
    }

    function triggerBite(monster) {
        gameActive = false;
        // Phase 1: Biss am Schreibtisch
        const pHead = document.getElementById('p-head');
        pHead.style.transform = "translateY(-50px) rotate(20deg)";
        pHead.style.background = "red";
        
        // Blut-Effekt
        for(let i=0; i<20; i++) {
            let b = document.createElement('div');
            b.className = 'blood';
            b.style.left = "500px"; b.style.top = "500px";
            b.style.opacity = "1";
            document.body.appendChild(b);
            let x = (Math.random()-0.5)*400, y = (Math.random()-0.5)*400;
            b.animate([{transform: 'translate(0,0)'}, {transform: `translate(${x}px, ${y}px)`}], 500);
        }

        // Phase 2: Vollbild Jumpscare
        setTimeout(() => {
            document.getElementById('scare-layer').style.display = 'flex';
            document.getElementById('face').style.background = monster === 'bonnie' ? 'var(--bonnie)' : 'var(--freddy)';
            setTimeout(() => { location.reload(); }, 2000);
        }, 500);
    }

    function die(msg) { alert(msg); location.reload(); }

    // Steuerung
    window.addEventListener('keydown', (e) => {
        if(e.key === 'a') toggleDoor('l');
        if(e.key === 'l') toggleDoor('r');
        if(e.key === 'm') toggleCam();
    });
</script>
</body>
</html>
