<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FNAF: The Final Bite</title>
    <style>
        :root { --freddy: #4b2e2e; --yellow: #ffd700; --blood: #8a0000; }
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }

        /* --- MENÜ --- */
        #menu {
            position: fixed; width: 100%; height: 100%; background: #000;
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 20px double #200; box-sizing: border-box;
        }
        .title { font-size: 5rem; color: #800; text-shadow: 0 0 20px red; animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: skew(2deg); } 50% { transform: skew(-2deg); opacity: 0.8; } 100% { transform: skew(0); } }

        /* --- BÜRO --- */
        #game-view { display: none; width: 100vw; height: 100vh; position: relative; background: #111; }
        #office {
            width: 1000px; height: 600px; margin: auto; position: relative;
            background: linear-gradient(to bottom, #1a1a1a, #050505);
            border: 10px solid #222; overflow: hidden;
        }

        /* Gelber Charakter von hinten */
        #player {
            position: absolute; bottom: 50px; left: 450px; width: 120px; height: 150px; z-index: 10;
        }
        .p-head { width: 60px; height: 60px; background: var(--yellow); border-radius: 50%; margin: 0 auto; position: relative; }
        .p-body { width: 90px; height: 100px; background: var(--yellow); border-radius: 20px 20px 0 0; margin: -5px auto; }

        /* --- FREDDY AN DER TÜR --- */
        #freddy-door {
            position: absolute; left: 0; bottom: 50px; width: 250px; height: 400px;
            display: none; z-index: 5;
        }
        .freddy-head { width: 120px; height: 100px; background: var(--freddy); border-radius: 30px; position: relative; }
        .freddy-jaw { width: 120px; height: 40px; background: #2b1d14; position: absolute; bottom: -20px; border-radius: 0 0 20px 20px; transition: 0.1s; }

        /* --- JUMPSCARE ANIMATION --- */
        #jumpscare-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 1000; justify-content: center; align-items: center;
            background: #000;
        }
        .attacker { position: relative; transform: scale(3); }
        .bite-top { width: 100px; height: 60px; background: var(--freddy); border-radius: 30px 30px 0 0; }
        .bite-bottom { width: 100px; height: 40px; background: #2b1d14; border-radius: 0 0 20px 20px; transform-origin: top; }
        
        .blood-drop {
            position: absolute; width: 10px; height: 10px; background: var(--blood);
            border-radius: 50%; opacity: 0;
        }

        @keyframes bite-action {
            0% { transform: translateY(0); }
            50% { transform: translateY(-30px) scale(1.2); }
            100% { transform: translateY(0); }
        }
        @keyframes spray {
            0% { transform: translate(0,0); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }

        /* --- TÜR & UI --- */
        .door { position: absolute; left: 0; width: 200px; height: 100%; background: #333; z-index: 20; transform: translateY(-100%); transition: 0.2s; border-right: 5px solid #111; }
        .door.closed { transform: translateY(0); }
        #ui { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .btn { padding: 15px 30px; background: #222; color: #fff; border: 2px solid red; cursor: pointer; font-family: 'Courier New'; }
    </style>
</head>
<body>

<div id="menu">
    <h1 class="title">THE BITE OF '26</h1>
    <button class="btn" onclick="initGame()">START NIGHT</button>
</div>

<div id="game-view">
    <div id="office">
        <div id="door-l" class="door"></div>
        
        <div id="freddy-door">
            <div class="freddy-head">
                <div style="width:15px; height:15px; background:red; border-radius:50%; position:absolute; top:30px; left:20px; box-shadow: 0 0 10px red;"></div>
                <div style="width:15px; height:15px; background:red; border-radius:50%; position:absolute; top:30px; right:20px; box-shadow: 0 0 10px red;"></div>
                <div class="freddy-jaw" id="jaw"></div>
            </div>
        </div>

        <div id="player">
            <div id="p-head" class="p-head"></div>
            <div class="p-body"></div>
        </div>
    </div>

    <div id="jumpscare-container">
        <div class="attacker" id="attacker">
            <div class="bite-top"></div>
            <div id="blood-box"></div>
            <div class="bite-bottom" id="bottom-jaw"></div>
        </div>
    </div>

    <div id="ui">
        <button class="btn" onclick="toggleDoor()">TÜR ZU/AUF</button>
        <div style="color:white; font-size:1.5rem;">POWER: <span id="pwr-val">100</span>% | TIME: <span id="time-val">12</span> AM</div>
    </div>
</div>

<script>
    let pwr = 100;
    let time = 12;
    let isDoorClosed = false;
    let freddyState = 0; // 0: Weg, 1: An der Tür
    let biteTimer = 0;

    function initGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-view').style.display = 'flex';
        runLogic();
    }

    function runLogic() {
        setInterval(() => {
            // Strom & Zeit
            pwr -= (isDoorClosed ? 0.4 : 0.1);
            document.getElementById('pwr-val').innerText = Math.floor(pwr);
            if(pwr <= 0) location.reload();

            // Freddy erscheint zufällig
            if(Math.random() > 0.96 && freddyState === 0) {
                freddyState = 1;
                document.getElementById('freddy-door').style.display = 'block';
            }

            // Der "2 Sekunden" Check
            if(freddyState === 1 && !isDoorClosed) {
                biteTimer++;
                // Kiefer bewegt sich leicht vor dem Biss
                document.getElementById('jaw').style.bottom = "-30px";
                
                if(biteTimer >= 4) { // 2 Sekunden (4 * 500ms)
                    triggerBite();
                }
            } else {
                biteTimer = 0;
                document.getElementById('jaw').style.bottom = "-20px";
            }
        }, 500);
    }

    function toggleDoor() {
        isDoorClosed = !isDoorClosed;
        document.getElementById('door-l').classList.toggle('closed');
        if(isDoorClosed && freddyState === 1) {
            freddyState = 0;
            document.getElementById('freddy-door').style.display = 'none';
        }
    }

    function triggerBite() {
        const jsc = document.getElementById('jumpscare-container');
        const pHead = document.getElementById('p-head');
        const bJaw = document.getElementById('bottom-jaw');
        
        jsc.style.display = 'flex';
        
        // Biss-Animation (Kiefer klappt zu)
        setTimeout(() => {
            bJaw.style.transform = "rotateX(-60deg)"; // Zubeißen
            pHead.style.display = 'none'; // Kopf weg
            spawnBlood(); // Blut spritzen
            
            // Schüttel-Effekt
            document.body.style.animation = "glitch 0.05s infinite";
            
            setTimeout(() => {
                alert("THE BITE OF '26 - DU BIST TOT.");
                location.reload();
            }, 2000);
        }, 200);
    }

    function spawnBlood() {
        const box = document.getElementById('blood-box');
        for(let i=0; i<30; i++) {
            const drop = document.createElement('div');
            drop.className = 'blood-drop';
            const x = (Math.random() - 0.5) * 300;
            const y = (Math.random() - 0.5) * 300;
            drop.style.setProperty('--x', x + 'px');
            drop.style.setProperty('--y', y + 'px');
            drop.style.animation = "spray 0.6s forwards";
            box.appendChild(drop);
        }
    }
</script>
</body>
</html>
