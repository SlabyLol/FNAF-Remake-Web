<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FNAF: The Web Nightmare</title>
    <style>
        :root { --metal: #1a1a1b; --rust: #3d2b1f; --glow: #ff0000; }
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; color: #fff; }

        #stage { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #050505; }

        /* --- DAS GRUSELIGE BÜRO --- */
        #office {
            width: 1000px; height: 600px; background: #0a0a0a;
            position: relative; border: 15px solid #111;
            perspective: 1200px; overflow: hidden;
            box-shadow: inset 0 0 300px #000;
        }

        .wall-left { position: absolute; width: 300px; height: 100%; left: -100px; transform: rotateY(60deg); background: linear-gradient(90deg, #000, #151515); border-right: 5px solid #222; }
        .wall-right { position: absolute; width: 300px; height: 100%; right: -100px; transform: rotateY(-60deg); background: linear-gradient(-90deg, #000, #151515); border-left: 5px solid #222; }

        /* --- DER ANIMATRONIC (DETAILLIERT) --- */
        #freddy {
            position: absolute; bottom: 50px; left: 80px; width: 150px; height: 350px;
            display: none; z-index: 5; filter: brightness(0.3); transition: filter 0.2s;
        }
        .head { width: 80px; height: 80px; background: #3d2b1f; border-radius: 20px; margin: 0 auto; position: relative; border: 2px solid #222; }
        .eye { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: 25px; box-shadow: 0 0 10px #ff0000; }
        .jaw { width: 70px; height: 30px; background: #2b1d14; position: absolute; bottom: -5px; left: 5px; border-radius: 0 0 10px 10px; }
        .body-main { width: 110px; height: 150px; background: #3d2b1f; border-radius: 40px; margin: 5px auto; }

        /* --- TÜREN --- */
        .door-frame { position: absolute; top: 0; width: 160px; height: 100%; background: #000; z-index: 10; }
        #door-l-frame { left: 0; }
        #door-l { width: 100%; height: 100%; background: #222; transform: translateY(-100%); transition: transform 0.3s ease-in; border-bottom: 10px solid #444; }
        #door-l.closed { transform: translateY(0); }

        /* --- MONITOR --- */
        #monitor {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #001; z-index: 100; display: none;
            background-image: repeating-linear-gradient(0deg, #000 0px, #000 1px, transparent 2px);
        }
        .static { position: absolute; width: 100%; height: 100%; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_tv.gif'); opacity: 0.1; }

        /* --- KRANKER JUMPSCARE --- */
        #scare-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            justify-content: center; align-items: center;
        }
        .scare-face {
            width: 400px; height: 400px; background: #3d2b1f; border-radius: 50%;
            position: relative; animation: shake 0.05s infinite, zoomIn 0.2s forwards;
        }
        .scare-eye { width: 80px; height: 80px; background: red; border-radius: 50%; position: absolute; top: 80px; box-shadow: 0 0 50px red; }
        .scare-mouth { width: 200px; height: 100px; background: #000; position: absolute; bottom: 50px; left: 100px; border-radius: 0 0 100px 100px; border: 5px solid #fff; }

        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(0, 0); } }
        @keyframes zoomIn { from { transform: scale(0.1); } to { transform: scale(2.5); } }
        @keyframes flash { 0% { background: #fff; } 10% { background: #000; } 20% { background: #400; } }

        /* --- 6 AM SCREEN --- */
        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .win-text { font-size: 8rem; color: #fff; text-shadow: 0 0 20px #0f0; animation: winPop 1s ease-out; }
        @keyframes winPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- UI --- */
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 200; }
        .control-btn { padding: 15px 40px; background: #111; border: 2px solid #333; color: #aaa; cursor: pointer; border-radius: 5px; }
        .control-btn:hover { background: #333; color: #fff; }
        #power-box { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: #f00; }
    </style>
</head>
<body>

<div id="stage">
    <div id="office">
        <div class="wall-left"></div>
        <div class="wall-right"></div>
        
        <div id="door-l-frame" class="door-frame">
            <div id="door-l"></div>
        </div>

        <div id="freddy">
            <div class="head">
                <div class="eye" style="left: 15px;"></div>
                <div class="eye" style="right: 15px;"></div>
                <div class="jaw"></div>
            </div>
            <div class="body-main"></div>
        </div>

        <div id="power-box">POWER: <span id="p-val">100</span>%</div>
    </div>

    <div id="monitor">
        <div class="static"></div>
        <h1 style="color:red; padding: 20px;">CAM 2A: WEST HALL</h1>
        <div id="cam-status" style="text-align:center; margin-top:150px; font-size:2rem;">STAGE: OCCUPIED</div>
    </div>

    <div id="hud">
        <button class="control-btn" onclick="toggleDoor()">TÜR</button>
        <button class="control-btn" onclick="toggleMonitor()">MONITOR</button>
        <div style="font-size: 1.5rem; padding-top: 10px;">ZEIT: <span id="time-val">12</span> AM</div>
    </div>
</div>

<div id="scare-layer">
    <div class="scare-face">
        <div class="scare-eye" style="left: 60px;"></div>
        <div class="scare-eye" style="right: 60px;"></div>
        <div class="scare-mouth"></div>
    </div>
</div>

<div id="win-screen">
    <div class="win-text">5 AM</div>
    <div class="win-text" id="six" style="display:none; color:#0f0;">6 AM</div>
</div>

<script>
    let pwr = 100;
    let time = 12;
    let doorOpen = true;
    let monitorOpen = false;
    let freddyStage = 0; // 0=Stage, 1=Hall, 2=Door, 3=Attack

    // Gameplay Loop
    const loop = setInterval(() => {
        // Stromverbrauch
        pwr -= (0.04 + (!doorOpen ? 0.2 : 0) + (monitorOpen ? 0.15 : 0));
        document.getElementById('p-val').innerText = Math.floor(pwr);
        if(pwr <= 0) die("STROM AUSFALL");

        // Zeit (Jede Minute eine Stunde)
        if(Math.random() > 0.99) {
            if(time === 12) time = 1; else time++;
            document.getElementById('time-val').innerText = time;
            if(time === 6) winGame();
        }
    }, 500);

    // AI Bewegung
    setInterval(() => {
        if(Math.random() > 0.6) {
            freddyStage++;
            updateAI();
        }
    }, 6000);

    function updateAI() {
        const freddy = document.getElementById('freddy');
        const camStatus = document.getElementById('cam-status');

        if(freddyStage === 1) camStatus.innerText = "STAGE: EMPTY - SOMETHING IS IN THE HALL";
        if(freddyStage === 2) {
            freddy.style.display = 'block';
            freddy.style.filter = 'brightness(0.1)';
        }
        if(freddyStage === 3) {
            if(!doorOpen) {
                freddyStage = 0;
                freddy.style.display = 'none';
                camStatus.innerText = "STAGE: OCCUPIED";
            } else {
                triggerJumpscare();
            }
        }
    }

    function toggleDoor() {
        doorOpen = !doorOpen;
        document.getElementById('door-l').classList.toggle('closed');
    }

    function toggleMonitor() {
        monitorOpen = !monitorOpen;
        document.getElementById('monitor').style.display = monitorOpen ? 'block' : 'none';
    }

    function triggerJumpscare() {
        clearInterval(loop);
        document.body.style.animation = "flash 0.1s infinite";
        document.getElementById('scare-layer').style.display = 'flex';
        // Simulierter Schrei-Effekt (Vibration)
        if (window.navigator.vibrate) window.navigator.vibrate([500, 100, 500]);
        
        setTimeout(() => {
            alert("ER HAT DICH ERWISCHT.");
            location.reload();
        }, 1500);
    }

    function die(reason) {
        alert(reason);
        location.reload();
    }

    function winGame() {
        clearInterval(loop);
        const ws = document.getElementById('win-screen');
        ws.style.display = 'flex';
        setTimeout(() => {
            document.querySelector('.win-text').style.display = 'none';
            document.getElementById('six').style.display = 'block';
        }, 2000);
        setTimeout(() => location.reload(), 7000);
    }
</script>
</body>
</html>
