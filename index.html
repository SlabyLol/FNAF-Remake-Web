<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FNAF: The Ultimate Web Edition</title>
    <style>
        :root { 
            --freddy: #5c3a21; --bonnie: #4b0082; --bb-shirt: repeating-linear-gradient(0deg, #f00 0px, #f00 10px, #00f 10px, #00f 20px);
            --yellow: #ffd700; --blood: #8a0000; 
        }
        body, html { margin: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; user-select: none; }

        /* --- UI & MENÜ --- */
        #menu, #win-screen, #game-over {
            position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .title { font-size: 3rem; color: #a00; text-shadow: 0 0 10px red; text-align: center; }
        .btn { padding: 15px 40px; background: #111; color: #fff; border: 2px solid #500; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .btn:hover { background: #500; }
        
        #win-screen, #game-over { display: none; }
        .glitch-text { animation: glitch 0.1s infinite; font-size: 5rem; color: red; }
        @keyframes glitch { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } }

        /* --- BÜRO --- */
        #game-view { display: none; width: 100%; height: 100%; position: relative; background: #050505; }
        #office {
            width: 1000px; height: 600px; margin: 20px auto; position: relative;
            background: linear-gradient(#1a1a1a, #000); border: 10px solid #222; overflow: hidden;
            box-shadow: inset 0 0 200px #000;
        }

        /* Türen & Fenster */
        .door-frame { position: absolute; top: 0; width: 160px; height: 100%; background: #000; border: 2px solid #111; }
        .door-frame.left { left: 0; border-right: 5px solid #333; } 
        .door-frame.right { right: 0; border-left: 5px solid #333; }
        .door { width: 100%; height: 100%; background: #222; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(-100%); border-bottom: 10px solid #111; }
        .door.closed { transform: translateY(0); }
        .window { position: absolute; top: 150px; width: 120px; height: 180px; background: #050505; border: 5px solid #111; }
        .window.left { left: 170px; } .window.right { right: 170px; }

        /* Spieler */
        #desk { position: absolute; bottom: 0; left: 200px; width: 600px; height: 120px; background: #222; border-top: 5px solid #444; z-index: 10; }
        #player { position: absolute; bottom: 50px; left: 450px; width: 100px; height: 130px; z-index: 15; }
        #p-head { width: 60px; height: 60px; background: var(--yellow); border-radius: 50%; margin: 0 auto; position: relative; }
        .p-body { width: 80px; height: 90px; background: var(--yellow); border-radius: 20px 20px 0 0; margin: -5px auto; }

        /* --- CSS ART: ANIMATRONICS --- */
        .monster { position: absolute; display: none; z-index: 5; }
        .eye { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: 20px; box-shadow: 0 0 10px #fff; }
        
        /* Freddy (Zylinder, Braun) */
        #freddy-door { right: 10px; bottom: 50px; width: 100px; height: 150px; }
        .freddy-hat { width: 40px; height: 30px; background: #111; margin: 0 auto; border-bottom: 5px solid #000; }
        .freddy-head { width: 80px; height: 70px; background: var(--freddy); border-radius: 30px; margin: 0 auto; position: relative; }
        
        /* Bonnie (Lila, Hasenohren) */
        #bonnie-door { left: 10px; bottom: 50px; width: 100px; height: 150px; }
        .bonnie-ear { width: 20px; height: 50px; background: var(--bonnie); border-radius: 10px; position: absolute; top: -40px; }
        .bonnie-head { width: 70px; height: 80px; background: var(--bonnie); border-radius: 30px; margin: 0 auto; position: relative; }

        /* Balloon Boy (Shirt, Ballon) */
        #bb-door { left: 10px; bottom: 0; width: 100px; height: 120px; }
        .bb-head { width: 60px; height: 60px; background: #ffccaa; border-radius: 50%; margin: 0 auto; position: relative; }
        .bb-propeller { width: 5px; height: 20px; background: #555; position: absolute; top: -20px; left: 27px; }
        .bb-body { width: 70px; height: 60px; background: var(--bb-shirt); border-radius: 20px 20px 0 0; margin: 0 auto; position: relative; }
        .bb-balloon { width: 40px; height: 50px; background: red; border-radius: 50%; position: absolute; top: -30px; left: -30px; }
        #bb-laugh { position: absolute; top: 20%; left: 0; width: 100%; text-align: center; color: yellow; font-size: 3rem; display: none; z-index: 900; animation: glitch 0.1s infinite; }

        /* --- KAMERA --- */
        #monitor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,10,0,0.95); z-index: 50; display: none; }
        #cam-screen { width: 700px; height: 400px; margin: 50px auto; border: 5px solid #333; background: #111; position: relative; }
        .cam-btn { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; margin: 5px; }

        /* --- TODES-SEQUENZ (KINO-MODUS) --- */
        #death-cinema { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; }
        #killer-model { position: absolute; bottom: 50px; left: 400px; width: 200px; height: 300px; transform: scale(1.5); }
        .killer-jaw { width: 100px; height: 40px; background: #111; border-radius: 0 0 20px 20px; position: absolute; bottom: 0; left: 50px; transform-origin: top; transition: 0.1s; }
        
        /* Blut Partikel */
        .blood-drop { position: absolute; width: 10px; height: 10px; background: var(--blood); border-radius: 50%; opacity: 0; }
        @keyframes spray { 0% { transform: translate(0,0) scale(1.5); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0.5); opacity: 0; } }

        /* --- VOLLBILD JUMPSCARE --- */
        #fullscreen-jumpscare {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000;
            z-index: 9000; display: none; justify-content: center; align-items: center;
        }
        #scare-face { width: 600px; height: 600px; background: var(--freddy); border-radius: 50%; position: relative; animation: intense-shake 0.05s infinite; }
        .scare-eye { width: 150px; height: 150px; background: #000; border-radius: 50%; position: absolute; top: 150px; border: 5px solid red; }
        .scare-mouth { width: 400px; height: 150px; background: #000; position: absolute; bottom: 50px; left: 100px; border-radius: 0 0 200px 200px; }
        @keyframes intense-shake { 0% { transform: translate(20px, 20px) scale(1.2); } 50% { transform: translate(-20px, -20px) scale(1.2); } 100% { transform: translate(0, 0) scale(1.2); } }

        /* --- UI STEUERUNG --- */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 80; }
        .c-btn { padding: 15px 30px; background: #111; color: #fff; border: 2px solid #555; cursor: pointer; }
        .c-btn:hover { background: #333; }
        .disabled-btn { opacity: 0.2; pointer-events: none; border-color: red !important; }
    </style>
</head>
<body>

<div id="menu">
    <h1 class="title">FIVE NIGHTS AT YELLOW'S<br>THE FINAL BITE</h1>
    <button class="btn" onclick="start()">START SHIFT</button>
</div>

<div id="game-view">
    <div id="office">
        <div class="door-frame left"><div id="door-l" class="door"></div></div>
        <div class="door-frame right"><div id="door-r" class="door"></div></div>

        <div class="window left">
            <div id="bonnie-door" class="monster">
                <div class="bonnie-head"><div class="bonnie-ear" style="left:10px;"></div><div class="bonnie-ear" style="right:10px;"></div><div class="eye" style="left:15px; background:red;"></div><div class="eye" style="right:15px; background:red;"></div></div>
            </div>
            <div id="bb-door" class="monster">
                <div class="bb-head"><div class="bb-propeller"></div><div class="eye" style="left:15px; background:blue;"></div><div class="eye" style="right:15px; background:blue;"></div></div>
                <div class="bb-body"><div class="bb-balloon"></div></div>
            </div>
        </div>
        <div class="window right">
            <div id="freddy-door" class="monster">
                <div class="freddy-hat"></div>
                <div class="freddy-head"><div class="eye" style="left:20px;"></div><div class="eye" style="right:20px;"></div></div>
            </div>
        </div>

        <div id="player"><div id="p-head"></div><div class="p-body"></div></div>
        <div id="desk"></div>
        <div id="bb-laugh">HA HA HA HA</div>

        <div id="death-cinema">
            <div id="killer-model">
                <div id="killer-top" style="width:100px; height:80px; border-radius:30px 30px 0 0; position:absolute; left:50px;"></div>
                <div class="killer-jaw" id="killer-jaw"></div>
            </div>
            <div id="blood-box" style="position:absolute; bottom:150px; left:500px;"></div>
        </div>
    </div>

    <div id="monitor">
        <h2 style="color:#0f0; text-align:center;">KAMERA LÄUFT</h2>
        <div id="cam-screen"></div>
        <div style="text-align:center;">
            <button class="cam-btn" onclick="switchCam('1A')">CAM 1A</button>
            <button class="cam-btn" onclick="switchCam('1B')">CAM 1B</button>
        </div>
    </div>

    <div id="fullscreen-jumpscare">
        <div id="scare-face">
            <div class="scare-eye" style="left:50px;"></div><div class="scare-eye" style="right:50px;"></div>
            <div class="scare-mouth"></div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-door-l" class="c-btn" onclick="toggleDoor('l')">TÜR LINKS</button>
        <button id="btn-cam" class="c-btn" onclick="toggleCam()">MONITOR</button>
        <button id="btn-door-r" class="c-btn" onclick="toggleDoor('r')">TÜR RECHTS</button>
        <div style="font-size: 1.5rem; margin-top: 10px;">POWER: <span id="pow">100</span>% | TIME: <span id="time">12</span> AM</div>
    </div>
</div>

<div id="win-screen"><h1 class="title" style="color:#0f0;">6 AM - ÜBERLEBT</h1><button class="btn" onclick="location.reload()">MENÜ</button></div>
<div id="game-over"><h1 class="glitch-text">WASTED</h1><p style="font-size: 2rem;" id="death-txt"></p><button class="btn" onclick="location.reload()">NEUSTART</button></div>

<script>
    let pow = 100, time = 12, gameOn = false;
    let doorL = false, doorR = false, camOpen = false, doorsDisabled = false;
    
    // AI Status (0=Weg, 1=An der Tür)
    let ai = { freddy: 0, bonnie: 0, bb: 0 };
    let attackTimer = { freddy: 0, bonnie: 0 };

    function start() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        gameOn = true;

        // Spiel & Strom Loop
        setInterval(() => {
            if(!gameOn) return;
            // Zeit
            if(Math.random() > 0.9) {
                time = time === 12 ? 1 : time + 1;
                document.getElementById('time').innerText = time;
                if(time === 6) win();
            }
            // Strom
            let drain = 0.2 + (doorL ? 0.5 : 0) + (doorR ? 0.5 : 0) + (camOpen ? 0.3 : 0);
            pow -= drain;
            document.getElementById('pow').innerText = Math.floor(pow);
            if(pow <= 0) die('freddy', 'STROM AUSFALL');
        }, 1000);

        // KI Bewegung (Alle 3 Sekunden)
        setInterval(() => {
            if(!gameOn) return;
            
            // Freddy (Rechts)
            if(Math.random() > 0.6 && ai.freddy === 0) { ai.freddy = 1; document.getElementById('freddy-door').style.display = 'block'; }
            // Bonnie (Links)
            if(Math.random() > 0.6 && ai.bonnie === 0 && ai.bb === 0) { ai.bonnie = 1; document.getElementById('bonnie-door').style.display = 'block'; }
            // Balloon Boy (Links) - Kommt nur wenn Bonnie nicht da ist
            if(Math.random() > 0.8 && ai.bb === 0 && ai.bonnie === 0 && !doorsDisabled) { ai.bb = 1; document.getElementById('bb-door').style.display = 'block'; }

            checkDeath();
        }, 3000);
    }

    function checkDeath() {
        // Balloon Boy Mechanik
        if(ai.bb === 1) {
            if(!doorL) {
                // BB kommt rein!
                doorsDisabled = true;
                ai.bb = 0;
                document.getElementById('bb-door').style.display = 'none';
                document.getElementById('bb-laugh').style.display = 'block';
                
                // Türen springen auf und Knöpfe blockieren
                doorL = false; doorR = false;
                document.getElementById('door-l').classList.remove('closed');
                document.getElementById('door-r').classList.remove('closed');
                document.getElementById('btn-door-l').classList.add('disabled-btn');
                document.getElementById('btn-door-r').classList.add('disabled-btn');
            } else {
                ai.bb = 0; // Abgewehrt
                document.getElementById('bb-door').style.display = 'none';
            }
        }

        // Tödliche Angriffe
        if(ai.freddy === 1) {
            if(!doorR) attackTimer.freddy++;
            else { ai.freddy = 0; attackTimer.freddy = 0; document.getElementById('freddy-door').style.display = 'none'; }
        }
        if(ai.bonnie === 1) {
            if(!doorL) attackTimer.bonnie++;
            else { ai.bonnie = 0; attackTimer.bonnie = 0; document.getElementById('bonnie-door').style.display = 'none'; }
        }

        if(attackTimer.freddy >= 2) triggerCinematicDeath('freddy', 'Freddy hat dich erwischt.');
        if(attackTimer.bonnie >= 2) triggerCinematicDeath('bonnie', 'Bonnie hat dich erwischt.');
    }

    // --- DIE KINOREIFE TODES-SEQUENZ ---
    function triggerCinematicDeath(killer, msg) {
        gameOn = false;
        camOpen = false;
        document.getElementById('monitor').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('bb-laugh').style.display = 'none';
        
        // Farben für den Killer setzen
        let kColor = killer === 'freddy' ? 'var(--freddy)' : 'var(--bonnie)';
        document.getElementById('killer-top').style.background = kColor;
        document.getElementById('killer-jaw').style.background = '#111';
        document.getElementById('scare-face').style.background = kColor;

        // PHASE 1: Der Biss am Schreibtisch
        document.getElementById('death-cinema').style.display = 'block';
        
        setTimeout(() => {
            // Kiefer klappt zu
            document.getElementById('killer-jaw').style.transform = "rotateX(-50deg) translateY(-20px)";
            document.getElementById('p-head').style.display = 'none'; // Spieler Kopf weg
            
            // Blut spritzen
            const bBox = document.getElementById('blood-box');
            for(let i=0; i<50; i++) {
                let drop = document.createElement('div');
                drop.className = 'blood-drop';
                let x = (Math.random() - 0.5) * 800;
                let y = (Math.random() - 0.5) * 800;
                drop.style.setProperty('--x', x + 'px');
                drop.style.setProperty('--y', y + 'px');
                drop.style.animation = "spray 0.8s forwards";
                bBox.appendChild(drop);
            }

            // PHASE 2: Vollbild Jumpscare nach kurzem Schock-Moment
            setTimeout(() => {
                document.getElementById('death-cinema').style.display = 'none';
                document.getElementById('office').style.display = 'none'; // Büro ausblenden
                document.getElementById('fullscreen-jumpscare').style.display = 'flex';
                document.body.style.animation = "glitch 0.05s infinite"; // Bildschirm wackelt

                // GAME OVER
                setTimeout(() => {
                    document.getElementById('fullscreen-jumpscare').style.display = 'none';
                    document.body.style.animation = "none";
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('death-txt').innerText = msg;
                }, 1500); // 1.5 Sekunden knallharter Jumpscare
                
            }, 800); // Zeit zwischen Biss und Jumpscare
        }, 500); // Kurze Pause, bevor er zubeißt
    }

    function toggleDoor(side) {
        if(!gameOn || doorsDisabled || pow <= 0) return;
        if(side === 'l') { doorL = !doorL; document.getElementById('door-l').className = doorL ? 'door closed' : 'door'; }
        if(side === 'r') { doorR = !doorR; document.getElementById('door-r').className = doorR ? 'door closed' : 'door'; }
    }

    function toggleCam() {
        if(!gameOn || pow <= 0) return;
        camOpen = !camOpen;
        document.getElementById('monitor').style.display = camOpen ? 'block' : 'none';
    }
    function switchCam(id) { /* Platzhalter für Kamerawechsel */ }

    function win() {
        gameOn = false;
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('win-screen').style.display = 'flex';
    }
    function die(k, m) { triggerCinematicDeath(k, m); }
</script>
</body>
</html>
